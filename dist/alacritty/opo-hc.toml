# Opo Hc — Colorblind-safe accessible theme

[colors.primary]
background = "#fdfaf3"
foreground = "#13191f"

[colors.cursor]
text = "#fdfaf3"
cursor = "#003c88"

[colors.selection]
text = "#13191f"
background = "#f4efe5"

[colors.normal]
