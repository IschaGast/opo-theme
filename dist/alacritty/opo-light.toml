# Opo Light — Colorblind-safe accessible theme

[colors.primary]
background = "#fbf8f2"
foreground = "#24292f"

[colors.cursor]
text = "#fbf8f2"
cursor = "#005ccc"

[colors.selection]
text = "#24292f"
background = "#eeeae2"

[colors.normal]
black   = "#24292f"
red   = "#9e4600"
green   = "#005d3f"
yellow   = "#925c00"
blue   = "#005ccc"
magenta   = "#7b3c79"
cyan   = "#00635f"
white   = "#eeeae2"

[colors.bright]
black   = "#57606a"
red   = "#e08440"
green   = "#419977"
yellow   = "#dca331"
blue   = "#478df5"
magenta   = "#ad6aab"
cyan   = "#209993"
white   = "#ffffff"
