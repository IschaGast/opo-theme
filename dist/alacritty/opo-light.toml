# Opo Light — Colorblind-safe accessible theme

[colors.primary]
background = "#fbf8f2"
foreground = "#24292f"

[colors.cursor]
text = "#fbf8f2"
cursor = "#005ccc"

[colors.selection]
text = "#24292f"
background = "#eeeae2"

[colors.normal]
black   = "#24292f"
red   = "#a75000"
green   = "#00756b"
yellow   = "#955f00"
blue   = "#002c85"
magenta   = "#682b68"
cyan   = "#005ccc"
white   = "#eeeae2"

[colors.bright]
black   = "#11161d"
red   = "#844000"
green   = "#005a52"
yellow   = "#704e00"
blue   = "#001f4d"
magenta   = "#550855"
cyan   = "#00489f"
white   = "#d4d0c6"
