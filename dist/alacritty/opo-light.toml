# Opo Light — Colorblind-safe accessible theme

[colors.primary]
background = "#fbf8f2"
foreground = "#24292f"

[colors.cursor]
text = "#fbf8f2"
cursor = "#005ccc"

[colors.selection]
text = "#24292f"
background = "#eeeae2"

[colors.normal]
black   = "#24292f"
red   = "#a44d00"
green   = "#00756b"
yellow   = "#925c00"
blue   = "#00358e"
magenta   = "#6e316e"
cyan   = "#005ccc"
white   = "#eeeae2"

[colors.bright]
black   = "#57606a"
red   = "#e08440"
green   = "#33a397"
yellow   = "#dca331"
blue   = "#2d6fcd"
magenta   = "#ad6aab"
cyan   = "#478df5"
white   = "#ffffff"
