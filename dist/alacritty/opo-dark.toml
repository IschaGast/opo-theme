# Opo Dark — Colorblind-safe accessible theme

[colors.primary]
background = "#121212"
foreground = "#d1d7df"

[colors.cursor]
text = "#121212"
cursor = "#2f83f5"

[colors.selection]
text = "#d1d7df"
background = "#16191c"

[colors.normal]
